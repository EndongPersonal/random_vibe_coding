<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vibe Coding Roller — 随机灵感决策工具</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>

  <!-- 动态背景光晕 -->
  <div class="bg-orbs">
    <div class="bg-orb"></div>
    <div class="bg-orb"></div>
    <div class="bg-orb"></div>
  </div>

  <!-- Top Bar: Theme + Language -->
  <div class="topbar" id="topbar">
    <button data-action="theme" id="btnTheme" data-i18n="themeDark">🌙 暗色</button>
    <button data-action="lang" data-lang="zh" class="active" data-i18n="langZH">中文</button>
    <button data-action="lang" data-lang="en" data-i18n="langEN">English</button>
  </div>

  <!-- Header -->
  <header class="header">
    <h1>Vibe Coding Roller</h1>
    <p class="subtitle" data-i18n="subtitle">随机决策 · 灵感生成 · 今天写什么？</p>
  </header>

  <!-- Mode Navigation -->
  <div class="nav-wrapper">
    <nav class="nav" id="nav">
      <button class="nav-btn active" data-mode="coin" data-i18n="navCoin">🪙 掷硬币</button>
      <button class="nav-btn" data-mode="dice" data-i18n="navDice">🎲 骰子</button>
      <button class="nav-btn" data-mode="wheel" data-i18n="navWheel">🎡 转盘</button>
      <button class="nav-btn" data-mode="card" data-i18n="navCard">🃏 抽卡</button>
      <button class="nav-btn" data-mode="tree" data-i18n="navTree">🌳 决策树</button>
      <button class="nav-btn" data-mode="iching" data-i18n="navIching">☯ 梅花易数</button>
      <button class="nav-btn" data-mode="group" data-i18n="navGroup">👥 分组</button>
      <button class="nav-btn" data-mode="almanac" data-i18n="navAlmanac">📅 黄历</button>
      <button class="nav-btn" data-mode="factory" data-i18n="navFactory">🏭 创意工厂</button>
      <button class="nav-btn" data-mode="trends" data-i18n="navTrends">🔥 Trends</button>
    <button class="nav-btn" data-mode="fishing" data-i18n="navFishing">🎣 电子钓鱼</button>
    </nav>
  </div>

  <!-- Main Content -->
  <main class="main" id="main">
    <!-- Panels rendered by JS -->
  </main>

  <!-- Scripts -->
  <script src="js/topics.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/app.js"></script>
  <script src="js/modes/coin.js"></script>
  <script src="js/modes/dice.js"></script>
  <script src="js/modes/wheel.js"></script>
  <script src="js/modes/card.js"></script>
  <script src="js/modes/tree.js"></script>
  <script src="js/modes/iching.js"></script>
  <script src="js/modes/group.js"></script>
  <script src="js/modes/almanac.js"></script>
  <script src="js/modes/factory.js"></script>
  <script src="js/modes/trends.js"></script>
  <script src="js/modes/fishing.js"></script>
</body>
</html>
