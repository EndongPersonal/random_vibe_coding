<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vibe Coding Roller — 随机灵感决策工具</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <h1>Vibe Coding Roller</h1>
    <p class="subtitle">随机决策 · 灵感生成 · 今天写什么？</p>
  </header>

  <!-- Mode Navigation -->
  <nav class="nav" id="nav">
    <button class="nav-btn active" data-mode="coin">🪙 掷硬币</button>
    <button class="nav-btn" data-mode="dice">🎲 骰子</button>
    <button class="nav-btn" data-mode="wheel">🎡 转盘</button>
    <button class="nav-btn" data-mode="card">🃏 抽卡</button>
    <button class="nav-btn" data-mode="tree">🌳 决策树</button>
    <button class="nav-btn" data-mode="iching">☯ 梅花易数</button>
    <button class="nav-btn" data-mode="group">👥 分组</button>
    <button class="nav-btn" data-mode="almanac">📅 黄历</button>
    <button class="nav-btn" data-mode="factory">🏭 创意工厂</button>
    <button class="nav-btn" data-mode="trends">🔥 Trends</button>
  </nav>

  <!-- Main Content -->
  <main class="main" id="main">
    <!-- Panels rendered by JS -->
  </main>

  <!-- Scripts -->
  <script src="js/topics.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/app.js"></script>
  <script src="js/modes/coin.js"></script>
  <script src="js/modes/dice.js"></script>
  <script src="js/modes/wheel.js"></script>
  <script src="js/modes/card.js"></script>
  <script src="js/modes/tree.js"></script>
  <script src="js/modes/iching.js"></script>
  <script src="js/modes/group.js"></script>
  <script src="js/modes/almanac.js"></script>
  <script src="js/modes/factory.js"></script>
  <script src="js/modes/trends.js"></script>
</body>
</html>
