<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vibe Coding Roller — 随机灵感决策工具</title>
  <meta name="description" content="Vibe Coding Roller — 11种随机灵感决策模式，650+编程灵感选项。掷骰子、抽卡牌、电子钓鱼、梅花易数…让命运帮你决定今天写什么代码。">
  <meta property="og:title" content="Vibe Coding Roller — 随机灵感决策工具">
  <meta property="og:description" content="11种模式，650+灵感选项，让命运帮你决定今天写什么代码。">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎲</text></svg>">
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Top Bar -->
  <div class="topbar" id="topbar" role="toolbar" aria-label="工具条">
    <button data-action="theme" id="btnTheme" data-i18n="themeLight" aria-label="切换主题">☀️ 亮色</button>
    <button data-action="lang" data-lang="zh" class="active" data-i18n="langZH" aria-label="切换到中文">中文</button>
    <button data-action="lang" data-lang="en" data-i18n="langEN" aria-label="Switch to English">English</button>
    <button data-action="ai" id="btnAI" data-i18n="aiSettings">⚙️ AI</button>
  </div>

  <!-- Hero -->
  <section class="hero">
    <h1>Vibe Coding Roller</h1>
    <p class="subtitle" data-i18n="subtitle">随机决策 · 灵感生成 · 今天写什么？</p>
  </section>

  <!-- Mode Navigation -->
  <div class="nav-wrapper">
    <nav class="nav" id="nav" aria-label="模式导航">
      <button class="nav-btn active" data-mode="coin" data-i18n="navCoin" aria-pressed="true">🪙 掷硬币</button>
      <button class="nav-btn" data-mode="dice" data-i18n="navDice" aria-pressed="false">🎲 骰子</button>
      <button class="nav-btn" data-mode="wheel" data-i18n="navWheel" aria-pressed="false">🎡 转盘</button>
      <button class="nav-btn" data-mode="card" data-i18n="navCard" aria-pressed="false">🃏 抽卡</button>
      <button class="nav-btn" data-mode="tree" data-i18n="navTree" aria-pressed="false">🌳 决策树</button>
      <button class="nav-btn" data-mode="iching" data-i18n="navIching" aria-pressed="false">☯ 梅花易数</button>
      <button class="nav-btn" data-mode="group" data-i18n="navGroup" aria-pressed="false">👥 分组</button>
      <button class="nav-btn" data-mode="almanac" data-i18n="navAlmanac" aria-pressed="false">📅 黄历</button>
      <button class="nav-btn" data-mode="factory" data-i18n="navFactory" aria-pressed="false">🏭 创意工厂</button>
      <button class="nav-btn" data-mode="trends" data-i18n="navTrends" aria-pressed="false">🔥 Trends</button>
      <button class="nav-btn" data-mode="fishing" data-i18n="navFishing" aria-pressed="false">🎣 电子钓鱼</button>
    </nav>
  </div>

  <!-- Main Content -->
  <main class="main" id="main" aria-live="polite">
    <noscript>
      <div class="card" style="padding:40px;text-align:center;">
        <p style="font-size:1.1rem;color:var(--text-secondary);">请启用 JavaScript 以使用 Vibe Coding Roller。</p>
      </div>
    </noscript>
  </main>

  <!-- AI Settings Modal -->
  <div class="ai-modal-overlay" id="aiModalOverlay" style="display:none;">
    <div class="ai-modal" role="dialog" aria-label="AI Settings">
      <div class="ai-modal-header">
        <h2 data-i18n="aiSettings">⚙️ AI 设置</h2>
        <button class="ai-modal-close" id="aiModalClose" aria-label="Close">&times;</button>
      </div>
      <div class="ai-modal-body">
        <p class="ai-modal-note">配置你的 OpenAI 兼容 API 来启用 AI 增强功能。API Key 仅存储在本地浏览器中。</p>
        <label class="ai-label" data-i18n="aiApiKey">API Key</label>
        <input type="password" class="ai-input" id="aiApiKey" placeholder="sk-...">
        <label class="ai-label" data-i18n="aiEndpoint">API 地址</label>
        <input type="text" class="ai-input" id="aiEndpoint" placeholder="https://api.openai.com/v1/chat/completions">
        <label class="ai-label" data-i18n="aiModel">模型</label>
        <input type="text" class="ai-input" id="aiModel" placeholder="gpt-4o-mini">
        <div class="ai-modal-actions">
          <button class="btn btn-secondary" id="aiTestBtn" data-i18n="aiTest">测试连接</button>
          <button class="btn btn-primary" id="aiSaveBtn" data-i18n="aiSave">保存配置</button>
        </div>
        <p class="ai-test-result" id="aiTestResult"></p>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/topics.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/ai.js"></script>
  <script src="js/app.js"></script>
  <script src="js/modes/coin.js"></script>
  <script src="js/modes/dice.js"></script>
  <script src="js/modes/wheel.js"></script>
  <script src="js/modes/card.js"></script>
  <script src="js/modes/tree.js"></script>
  <script src="js/modes/iching.js"></script>
  <script src="js/modes/group.js"></script>
  <script src="js/modes/almanac.js"></script>
  <script src="js/modes/factory.js"></script>
  <script src="js/modes/trends.js"></script>
  <script src="js/modes/fishing.js"></script>
</body>
</html>
